<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренувальний план — Full Body</title>
<style>
  :root{
    --bg: #0a0c15;
    --panel: #141824;
    --panel2: #1a2030;
    --line: #2a3050;
    --ink: #ffffff;
    --muted: #b8c4e0;
    --accent: #e8a33d;
    --accent2: #4a90d9;
    --green: #3cb371;
    --red: #d9534f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: #ffffff;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }
  header{
    padding: 18px 16px 10px; text-align:center; position:sticky; top:0; z-index:10;
    background: linear-gradient(180deg, #0a0c15 80%, transparent);
  }
  header h1{
    margin:0; font-size: 1.8rem; letter-spacing:.5px;
    font-family: Georgia, 'Times New Roman', serif;
    color: #ffffff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    font-weight: 700;
  }
  header .sub{ 
    color: #d8ddf0; 
    font-size: 1rem; 
    margin-top:6px;
    font-weight: 400;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  .week-bar{
    display:flex; gap:6px; justify-content:center; flex-wrap:wrap;
    padding: 8px 12px 14px;
  }
  .week-bar button{
    background:var(--panel); border:1px solid var(--line); color: #d8ddf0;
    padding:8px 14px; border-radius:8px; font-size:.85rem; cursor:pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .week-bar button:hover{
    background: var(--panel2);
    border-color: var(--accent2);
    color: #ffffff;
  }
  .week-bar button.active{
    background: var(--accent); color:#1a1208; border-color:var(--accent); font-weight:700;
  }

  nav.days{
    display:flex; gap:8px; padding: 0 12px 12px; justify-content:center;
  }
  nav.days button{
    flex:1; max-width:160px; background:var(--panel2); border:1px solid var(--line);
    color:#d8ddf0; padding:12px 8px; border-radius:10px; font-size:.9rem; cursor:pointer;
    font-weight:600;
    transition: all 0.2s;
  }
  nav.days button:hover{
    background: var(--panel);
    border-color: var(--accent);
    color: #ffffff;
  }
  nav.days button.active{
    background: linear-gradient(135deg,#2a3a5c,#1d2130); border-color: var(--accent2);
    box-shadow: 0 0 0 2px var(--accent2) inset;
    color: #ffffff;
  }

  main{ max-width: 720px; margin: 0 auto; padding: 0 12px 60px; }

  .group-label{
    margin: 22px 0 10px; font-size:.8rem; letter-spacing:1.5px; text-transform:uppercase;
    color: var(--accent); display:flex; align-items:center; gap:6px;
    font-weight: 600;
  }
  .group-label hr{ flex:1; border:none; border-top:2px solid var(--line);}

  .card{
    background: var(--panel); border:1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 12px;
  }
  .card.done{ opacity:.5; }
  .card-top{ display:flex; align-items:flex-start; gap:12px; }
  .chk{
    width:24px; height:24px; border-radius:6px; border:2px solid var(--muted);
    flex:0 0 auto; cursor:pointer; display:flex; align-items:center; justify-content:center;
    margin-top:2px;
    color: var(--ink);
    transition: all 0.2s;
    font-size: 1.1rem;
    font-weight: bold;
  }
  .chk:hover{
    border-color: var(--accent);
    background: rgba(232,163,61,0.1);
  }
  .chk.checked{ background:var(--green); border-color:var(--green); color:#0a0c15; font-weight:bold;}
  .ex-name{ 
    font-weight:700; 
    font-size:1.05rem; 
    color: #ffffff; 
    margin-bottom: 2px;
  }
  .ex-meta{ 
    color: #b8c4e0; 
    font-size:.85rem; 
    margin-top:2px;
    font-weight: 400;
  }
  .week-progress-line{
    color: #7ab8ff; 
    font-size:.75rem; 
    margin-top:6px; 
    line-height:1.6;
    word-spacing: 3px;
    background: rgba(74, 144, 217, 0.08);
    padding: 4px 8px;
    border-radius: 6px;
  }
  .cur-week{ 
    color: var(--accent); 
    font-weight: 700;
    font-size: .85rem;
    background: rgba(232,163,61,0.2);
    padding: 1px 6px;
    border-radius: 4px;
  }

  .actions{ margin-left:auto; display:flex; gap:8px; flex:0 0 auto; }
  .icon-btn{
    background:var(--panel2); border:1px solid var(--line); color:#d8ddf0;
    border-radius:8px; padding:8px 12px; font-size:.85rem; cursor:pointer; text-decoration:none;
    white-space:nowrap;
    transition: all 0.2s;
    font-weight: 500;
  }
  .icon-btn:hover{ 
    border-color:var(--accent2); 
    color: #ffffff;
    background: var(--panel);
    transform: scale(1.05);
  }

  .sets-row{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .set-input{
    display:flex; flex-direction:column; gap:4px; flex:1; min-width:75px;
  }
  .set-input label{ 
    font-size:.7rem; 
    color: #b8c4e0;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .set-input input{
    width:100%; background: #0d0f1a; border:1px solid var(--line); color: #ffffff;
    border-radius:6px; padding:8px 8px; font-size:.9rem; text-align:center;
    transition: all 0.2s;
    font-weight: 500;
  }
  .set-input input:focus{ 
    outline:none; 
    border-color:var(--accent2);
    box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.25);
    background: #131625;
  }
  .set-input input::placeholder{
    color: #6a7290;
    font-weight: 400;
  }

  .last-log{
    margin-top:10px; font-size:.85rem; color: #d8ddf0;
    background: #0d0f1a; border-radius:8px; padding:8px 12px; border:1px solid var(--line);
  }
  .last-log b{ color: var(--green); font-weight: 700; }

  .custom-line{
    margin-top:8px;
  }

  .custom-line input{
    width:100%; background:#0d0f1a; border:1px solid var(--line); color:#ffffff;
    border-radius:6px; padding:8px 10px; font-size:.9rem;
  }

  .note-box{
    background: rgba(232,163,61,.1); border:1px solid rgba(232,163,61,.25);
    border-radius:10px; padding:12px 16px; font-size:.85rem; color: #e8d5a8; margin: 16px 0;
    line-height: 1.6;
  }
  .cardio-box{
    background: rgba(60,179,113,.1); border:1px solid rgba(60,179,113,.25);
    border-radius:10px; padding:12px 16px; font-size:.85rem; color: #a8e0c0; margin: 8px 0 16px;
    line-height: 1.6;
  }

  .save-bar{
    position: sticky; bottom:0; padding: 10px 12px 4px; background: linear-gradient(0deg,#0a0c15 75%, transparent);
    display:flex; justify-content:center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .save-bar button{
    background: var(--accent); color:#1a1208; border:none; border-radius:12px;
    padding: 14px 32px; font-size:1.05rem; font-weight:700; cursor:pointer;
    box-shadow: 0 4px 20px rgba(232,163,61,.25);
    transition: all 0.2s;
  }
  .save-bar button:hover{
    transform: scale(1.03);
    box-shadow: 0 6px 28px rgba(232,163,61,.4);
  }
  .save-bar button.secondary{
    background: var(--panel2);
    color: #d8ddf0;
    border: 1px solid var(--line);
    box-shadow: none;
  }
  .save-bar button.secondary:hover{
    background: var(--panel);
    border-color: var(--accent2);
    color: #ffffff;
  }
  .save-bar button.danger{
    background: var(--red);
    color: #ffffff;
    box-shadow: 0 4px 20px rgba(217, 83, 79, .25);
  }
  .save-bar button.danger:hover{
    box-shadow: 0 6px 28px rgba(217, 83, 79, .4);
  }
  .import-bar{
    position: sticky; bottom:0; padding: 0 12px 14px;
    display:flex; justify-content:center; background: linear-gradient(0deg,#0a0c15 80%, transparent);
  }
  .import-bar button{
    background: var(--panel2); color:#b8c4e0; border:1px solid var(--line);
    border-radius:10px; padding:10px 22px; font-size:.9rem; cursor:pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .import-bar button:hover{ 
    border-color:var(--accent2); 
    color:#ffffff; 
    background: var(--panel);
  }

  .alt-select{
    width:100%; background: #0d0f1a; border:1px solid var(--line);
    color: #b8c4e0; border-radius:6px;
    font-size:.85rem; padding:6px 10px; margin-top:8px;
    cursor:pointer; outline:none;
    -webkit-appearance:none; appearance:none;
    transition: all 0.2s;
  }
  .alt-select:focus{ 
    border-color:var(--accent); 
    color:#ffffff;
    box-shadow: 0 0 0 2px rgba(232,163,61,0.15);
  }
  .alt-select option{ 
    background:var(--panel); 
    color:#ffffff;
    padding: 4px;
  }
  .toast{
    position: fixed; bottom: 80px; left:50%; transform:translateX(-50%);
    background: var(--green); color:#0a0c15; padding:12px 24px; border-radius:12px;
    font-size:1rem; font-weight:700; opacity:0; transition:opacity .3s; pointer-events:none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 100;
  }
  .toast.show{ opacity:1; }

  .icon-btn.save-ex{ color: var(--accent); border-color: rgba(232,163,61,.3); }
  .icon-btn.save-ex:hover{ 
    border-color: var(--accent);
    color: var(--accent);
  }
  .icon-btn.save-ex.saved{ color: var(--green); border-color: rgba(60,179,113,.3); }
  .icon-btn.cal-btn{ color: var(--accent2); }
  .icon-btn.cal-btn:hover{ color: #7ab8ff; }

  .modal-overlay{
    position: fixed; inset:0; background: rgba(0,0,0,.8); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-sheet{
    background: var(--panel); border:1px solid var(--line); border-radius: 16px 16px 0 0;
    width:100%; max-width: 720px; max-height: 78vh; overflow-y:auto; padding: 20px 20px 28px;
  }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .modal-head h3{ 
    margin:0; 
    font-size:1.1rem; 
    color: #ffffff;
    font-weight: 700;
  }
  .modal-close{
    background:var(--panel2); border:1px solid var(--line); color:#d8ddf0;
    border-radius:8px; width:36px; height:36px; cursor:pointer; font-size:1.2rem;
    transition: all 0.2s;
    font-weight: bold;
  }
  .modal-close:hover{
    border-color: var(--red);
    color: #ffffff;
    background: rgba(217, 83, 79, 0.1);
  }
  .hist-row{
    display:flex; justify-content:space-between; gap:12px; padding:10px 14px;
    background: #0d0f1a; border-radius:8px; margin-bottom:8px; font-size:.9rem;
  }
  .hist-row .hd{ color: #b8c4e0; flex:0 0 auto; font-weight: 500; }
  .hist-row .hv{ color: #ffffff; text-align:right; font-weight: 600; }
  .hist-empty{ color:#b8c4e0; font-size:.9rem; text-align:center; padding: 24px 0; }

  .profile-bar{
    display:flex; gap:10px; justify-content:center; padding: 6px 12px 12px;
  }
  .profile-bar button{
    background:var(--panel2); border:1px solid var(--line); color:#b8c4e0;
    padding:10px 22px; border-radius:10px; font-size:.9rem; cursor:pointer; font-weight:600;
    transition: all 0.2s;
  }
  .profile-bar button:hover{
    border-color: var(--accent);
    color: #ffffff;
    background: var(--panel);
  }
  .profile-bar button.active{
    background: linear-gradient(135deg,#3a2a1a,#1d2130); border-color: var(--accent);
    color: #ffffff; box-shadow: 0 0 0 2px var(--accent) inset;
  }

  .status-badge{
    display: inline-block;
    background: rgba(60, 179, 113, 0.2);
    color: var(--green);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: .7rem;
    font-weight: 600;
    margin-left: 8px;
  }
</style>

<body>

<header>
  <h1 id="appTitle">🏋 План тренувань</h1>
  <div class="sub" id="appSub"></div>
</header>

<div class="week-bar" id="weekBar"></div>

<main id="main"></main>

<div class="save-bar">
  <button id="saveBtn">💾 Зберегти все тренування</button>
  <button id="resendBtn" class="secondary">🔄 Перевідправити звіт</button>
  <button id="clearSentBtn" class="danger">🗑 Скинути заборону</button>
</div>
<div class="import-bar">
  <button id="importBtn" onclick="document.getElementById('xlsxInput').click()">📂 Завантажити план (.xlsx)</button>
  <input type="file" id="xlsxInput" accept=".xlsx" style="display:none">
</div>
<div class="toast" id="toast">Збережено!</div>
<div id="modalRoot"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
const ONERM = {
  'Жим лежачи в тренажері Сміта (горизонтальний)': 104.5,
  'Жим у Сміті під кутом': 107.7,
  'Метелик (Pec-Deck)': 126.7,
  'Горизонтальна тяга широкою ручкою': 100,
  'Вертикальна тяга широкою ручкою': 126.7,
  'Жим на тренажері (армійський жим)': 70,
  'Протяжка в Сміті': 86.7,
  'Шраги зі штангою': 180,
  'Згинання рук зі штангою стоячи': 70,
  'Кросовер канат': 70,
  'Тяга у кросовері з-за голови': 55,
  'Згинання кистей зі штангою сидячи': 63,
};
const PCT_BY_WEEK = {1:0.60,2:0.70,3:0.75,4:0.65,5:[0.77,0.80],6:[0.72,0.75],7:[0.80,0.82],8:0.65};
const REPS_BY_WEEK = {1:'12–15',2:'10–12',3:'8–10',4:'12–15',5:'8–10',6:'10–12',7:'6–8',8:'12–15'};
function round25(x){ return Math.round(x/2.5)*2.5; }
function targetWeight(name, week){
  if(profile !== 'man') return null;
  if(!ONERM[name]) return null;
  const pct = PCT_BY_WEEK[week];
  const onerm = ONERM[name];
  if(Array.isArray(pct)){
    const lo = round25(onerm*pct[0]), hi = round25(onerm*pct[1]);
    return lo===hi ? `${lo} кг` : `${lo}–${hi} кг`;
  }
  return `${round25(onerm*pct)} кг`;
}

function ytUrl(name){
  const clean = name.split(' (')[0];
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(clean + ' техніка виконання');
}

const PULLUP_WEEKLY = {1:'+0',2:'+2.5',3:'+5',4:'+0',5:'+7.5',6:'+5',7:'+10',8:'+0'};
const PLANK_WEEKLY  = {1:'45',2:'50',3:'55',4:'45',5:'60',6:'65',7:'70',8:'50'};
const WOMAN_REPS_WEEKLY = {1:'12–15',2:'12–15',3:'12',4:'12',5:'10–12',6:'10–12',7:'10',8:'10'};
const WOMAN_PLANK_WEEKLY = {1:'30',2:'30',3:'30–35',4:'35',5:'35',6:'40',7:'40',8:'40'};

function weeklyProgressionLine(it){
  const name = it.name;
  if(profile === 'man'){
    if(ONERM[name]){
      const parts = [];
      for(let w=1; w<=8; w++){
        const pct = PCT_BY_WEEK[w];
        const onerm = ONERM[name];
        let val;
        if(Array.isArray(pct)){
          const lo = round25(onerm*pct[0]), hi = round25(onerm*pct[1]);
          val = lo===hi ? `${lo}` : `${lo}-${hi}`;
        }else{
          val = `${round25(onerm*pct)}`;
        }
        parts.push(`Т${w}:${val}`);
      }
      return { text: '⚖️ ' + parts.join('  ') + ' кг', highlightWeek: true };
    }
    if(it.bodyweight){
      const parts = Object.keys(PULLUP_WEEKLY).map(w=>`Т${w}:${PULLUP_WEEKLY[w]}`);
      return { text: '⚖️ ' + parts.join('  ') + ' кг (на поясі)', highlightWeek: true };
    }
    if(it.isTime){
      const parts = Object.keys(PLANK_WEEKLY).map(w=>`Т${w}:${PLANK_WEEKLY[w]}`);
      return { text: '⚖️ ' + parts.join('  ') + ' сек', highlightWeek: true };
    }
    return null;
  }else{
    if(it.isTime){
      const parts = Object.keys(WOMAN_PLANK_WEEKLY).map(w=>`Т${w}:${WOMAN_PLANK_WEEKLY[w]}`);
      return { text: '⏱ ' + parts.join('  ') + ' сек', highlightWeek: false };
    }
    return null;
  }
}

const DAYS_WOMAN = [

let profile = localStorage.getItem('trenuvannya-profile') || 'man';
function getDays(){ return profile === 'woman' ? DAYS_WOMAN : DAYS_MAN; }


let currentDay = 0;
let currentWeek = 1;
let checkedState = {};
let lastLogs = {};
let pendingSets = {};
let savedThisSession = {};

function exId(dayId, name){ return dayId + '::' + name; }

const hasClaudeStorage = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');

async function storageGet(key){
  if(hasClaudeStorage){
    try{
      const res = await window.storage.get(key);
      return res ? res.value : null;
    }catch(e){ return null; }
  }
  return localStorage.getItem(key);
}
async function storageSet(key, value){
  if(hasClaudeStorage){
    try{ await window.storage.set(key, value); return; }catch(e){ /* fall through */ }
  }
  localStorage.setItem(key, value);
}

async function loadLastLogs(){
  for(const day of getDays()){
    for(const g of day.groups){
      for(const it of g.items){
        const id = exId(day.id, it.name);
        const raw = await storageGet('lastlog:'+id);
        if(raw){
          try{ lastLogs[id] = JSON.parse(raw); }catch(e){ /* ignore bad data */ }
        }
      }
    }
  }
}

function fmtLast(log){
  if(!log) return null;
  const sets = (log.sets||[]).filter(s=>s.w || s.r).map(s=> `${s.w||'-'}/${s.r||'-'}`).join(', ');
  return `📅 ${log.date}: ${sets || '—'}`;
}

const TG_QUEUE_KEY = 'tg-queue-v2';

function getTgQueue(){

function setTgQueue(q){
  try{ localStorage.setItem(TG_QUEUE_KEY, JSON.stringify(q)); }catch(e){ }

function getSentDates(){

function markSent(sentKey){

}

function queueTelegramMessages(texts, sentKey, chatIds){
  const q = getTgQueue();
  q.push({ texts, sentKey, chatIds, ts: Date.now() });
  if(q.length > 100) q.splice(0, q.length - 100);
  setTgQueue(q);
}

async function sendToTelegram(chatId, text){
  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: chatId,
      text: text,
      parse_mode: 'HTML'
    })
  });
  
  if (!response.ok) {
    const error = await response.text();
    throw new Error(`Telegram API error: ${response.status} - ${error}`);
  }
  return response.json();
}

async function sendToChats(text, chatIds){
  const results = await Promise.allSettled(
    chatIds.map(chatId => sendToTelegram(chatId, text))
  );
  
  const failed = results.filter(r => r.status === 'rejected');
  if (failed.length > 0) {
    console.warn(`❌ Не вдалося відправити в ${failed.length} чатів`);
    throw new Error(`Failed to send to ${failed.length} chats`);
  }
  return results;
}

let tgFlushing = false;
async function flushTelegramQueue(){
  if(tgFlushing) return;
  tgFlushing = true;
  try{
    let q = getTgQueue();
    while(q.length){
      const item = q[0];
      try{
        const textList = Array.isArray(item.texts) ? item.texts : [item.texts || item.text];
        const chatIds = item.chatIds || [CHAT_ID_MAIN];
        for(const t of textList){
          await sendToChats(t, chatIds);
        }
        if(item.sentKey) markSent(item.sentKey);
        q.shift();
        setTgQueue(q);
      }catch(e){ 
        console.warn('⏳ Черга тимчасово недоступна, спробуємо пізніше:', e.message);
        break;
      }
    }
  } finally { 
    tgFlushing = false; 
  }
}

// ---- Статистика тренування ----
function calcStats(allSets, day){
  let totalTonnage = 0;
  let totalSets = 0;
  let totalExercises = 0;
  const records = [];

  for(const g of day.groups){
    for(const it of g.items){
      const sets = allSets[it.name];
      if(!sets || !sets.length) continue;
      totalExercises++;
      for(const s of sets){
        totalSets++;
        const w = parseFloat(s.w);
        const r = parseFloat(s.r);
        if(!isNaN(w) && !isNaN(r)) totalTonnage += w * r;
      }
      const id = exId(day.id, it.name);
      const hist = [];
      try{
        const raw = localStorage.getItem('history:' + id);
        if(raw) hist.push(...JSON.parse(raw));
      }catch(e){}
      const today = new Date().toISOString().slice(0,10);
      let bestPrev = 0;
      for(const entry of hist){
        if(entry.date === today) continue;
        for(const s of (entry.sets||[])){
          const w = parseFloat(s.w), r = parseFloat(s.r);
          if(!isNaN(w) && !isNaN(r)){
            const e1rm = w * (1 + r/30);
            if(e1rm > bestPrev) bestPrev = e1rm;
          }
        }
      }
      let todayBest = 0; let todayBestW = 0; let todayBestR = 0;
      for(const s of sets){
        const w = parseFloat(s.w), r = parseFloat(s.r);
        if(!isNaN(w) && !isNaN(r)){
          const e1rm = w * (1 + r/30);
          if(e1rm > todayBest){ todayBest = e1rm; todayBestW = w; todayBestR = r; }
        }
      }
      if(todayBest > 0 && todayBest > bestPrev && bestPrev > 0){
        records.push(`🏆 Рекорд: ${it.name} — ${todayBestW}×${todayBestR}`);
      }
    }
  }
  return { totalTonnage: Math.round(totalTonnage), totalSets, totalExercises, records };
}

function buildWorkoutMessage(day, today, numberedLines, stats){
  const profileLabel = profile==='woman' ? '🙋‍♀️ Жінка' : '🙋‍♂️ Чоловік';
  const weekTxt = profile==='man' ? `  •  Тиж.${currentWeek}` : '';
  let msg = `🏋 ${profileLabel} — ${day.label}${weekTxt}\n📅 ${today}\n`;
  msg += '─'.repeat(30) + '\n';
  msg += numberedLines.join('\n');
  msg += '\n' + '─'.repeat(30) + '\n';
  msg += `📊 Підсумок:\n`;
  msg += `💪 Вправ: ${stats.totalExercises}\n`;
  msg += `🔢 Підходів: ${stats.totalSets}\n`;
  if(stats.totalTonnage > 0) msg += `📈 Тоннаж: ${stats.totalTonnage} кг\n`;
  if(stats.records.length){
    msg += '\n' + stats.records.join('\n') + '\n';
  }
  return msg;
}

async function logExercise(id, log){
  lastLogs[id] = log;
  await storageSet('lastlog:'+id, JSON.stringify(log));
  let hist = [];
  const h = await storageGet('history:'+id);
  if(h){
    try{ hist = JSON.parse(h); }catch(e){ hist = []; }
  }
  hist.push(log);
  if(hist.length>30) hist = hist.slice(-30);
  await storageSet('history:'+id, JSON.stringify(hist));
}

function setsFromPending(id){
  return (pendingSets[id]||[]).map(s=>{
    if(!s.raw) return {w:'',r:''};
    const parts = s.raw.split('/');
    return {w: parts[0]?.trim()||'', r: parts[1]?.trim()||''};
  }).filter(s=>s.w || s.r);
}

async function sendWorkoutReport(force = false){
  const day = getDays()[currentDay];
  const today = new Date().toISOString().slice(0,10);
  const sentKey = `${profile}::${day.id}::${today}`;

  // Якщо не force і вже відправлено — виходимо
  if(!force && alreadySent(sentKey)){
    showToast('Звіт за сьогодні вже відправлено в Telegram');
    return false;
  }

  // Якщо force — очищаємо стару позначку
  if(force){
    clearSent(sentKey);
  }

  let any = false;
  let num = 1;
  const numberedLines = [];
  const allSets = {};
  for(const g of day.groups){
    for(const it of g.items){
      const id = exId(day.id, it.name);
      const sets = setsFromPending(id);
      if(sets.length){
        any = true;
        try{
          await logExercise(id, {date: today, sets});
          savedThisSession[id] = true;
          const setsTxt = sets.map(s=>`${s.w||'-'}/${s.r||'-'}`).join(' | ');
          const altText = (pendingSets[id+'::alt'] || {}).raw || '';
          const nameLine = altText ? `${it.name} → ${altText}` : it.name;
          numberedLines.push(`${num}. ${nameLine}\n   ${setsTxt}`);
          num++;
          allSets[it.name] = sets;
        }catch(e){ console.error('storage error', e); }
      }
    }
  }
  
  if(any){
    const stats = calcStats(allSets, day);
    const text = buildWorkoutMessage(day, today, numberedLines, stats);
    
    // Визначаємо, куди відправляти
    let chatIds = [];
    if(profile === 'woman'){
      // Жінка → тільки в жіночий чат
      chatIds = [CHAT_ID_WOMAN];
    } else {
      // Чоловік → в обидва чати
      chatIds = [CHAT_ID_MAIN, CHAT_ID_WOMAN];
    }
    
    queueTelegramMessages([text], sentKey, chatIds);
    flushTelegramQueue();
    showToast(force ? '🔄 Звіт перевідправлено!' : 'Тренування збережено і відправлено!');
    if(!force) renderMain();
    return true;
  } else {
    showToast('Немає даних для збереження');
    return false;
  }
}

  await sendWorkoutReport(false);
}

      if(sets.length){
        hasData = true;
        break;
      }
    }
    if(hasData) break;
  }
  
  if(!hasData){
    showToast('Немає даних для перевідправки');
    return;
  }
  
  if(confirm(`Перевідправити звіт за сьогодні (${today})?`)){
    await sendWorkoutReport(true);
  }
}

function clearSentRestriction(){
  const day = getDays()[currentDay];
  const today = new Date().toISOString().slice(0,10);
  const sentKey = `${profile}::${day.id}::${today}`;
  
  if(alreadySent(sentKey)){
    if(confirm(`Скинути заборону на відправку звіту за ${today}?`)){
      clearSent(sentKey);
      showToast('✅ Заборону скинуто! Можна відправляти знову.');
    }
  } else {
    showToast('Заборона на відправку відсутня');
  }
}

async function saveExercise(id, it, dayId){
  const today = new Date().toISOString().slice(0,10);
  const sets = setsFromPending(id);
  if(!sets.length){
    showToast('Заповніть хоча б один сет');
    return;
  }
  try{
    await logExercise(id, {date: today, sets});
    savedThisSession[id] = true;
    showToast(`${it.name} — збережено локально`);
    renderMain();
  }catch(e){
    console.error('storage error', e);
    showToast('Помилка збереження');
  }
}

async function getHistory(id){
  const h = await storageGet('history:'+id);
  if(!h) return [];
  try{ return JSON.parse(h); }catch(e){ return []; }
}

async function openHistory(id, name){
  const hist = await getHistory(id);
  const root = document.getElementById('modalRoot');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e)=>{ if(e.target===overlay) closeModal(); };

  const sheet = document.createElement('div');
  sheet.className = 'modal-sheet';

  const head = document.createElement('div');
  head.className = 'modal-head';
  head.innerHTML = `<h3>🗓 Історія — ${name}</h3>`;
  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = '✕';
  closeBtn.onclick = closeModal;
  head.appendChild(closeBtn);
  sheet.appendChild(head);

  if(!hist.length){
    const empty = document.createElement('div');
    empty.className = 'hist-empty';
    empty.textContent = 'Записів ще немає. Збережіть перше тренування цієї вправи.';
    sheet.appendChild(empty);
  }else{
    [...hist].reverse().forEach(log=>{
      const row = document.createElement('div');
      row.className = 'hist-row';
      const setsTxt = (log.sets||[]).map(s=>`${s.w||'-'}/${s.r||'-'}`).join(', ');
      row.innerHTML = `<span class="hd">📅 ${log.date}</span><span class="hv">${setsTxt}</span>`;
      sheet.appendChild(row);
    });
  }

  overlay.appendChild(sheet);
  root.appendChild(overlay);
}

function closeModal(){
  const root = document.getElementById('modalRoot');
  root.innerHTML = '';
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2000);
}


document.getElementById('saveBtn').onclick = saveWorkout;
document.getElementById('resendBtn').onclick = resendWorkout;
document.getElementById('clearSentBtn').onclick = clearSentRestriction;

// ---- ІМПОРТ EXCEL ----
function importXlsx(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});

      function parseSheet(sheetName){
        const ws = wb.Sheets[sheetName];
        if(!ws) return null;
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        let headerRow = -1;
        for(let i=0; i<rows.length; i++){
          if(String(rows[i][0]).toLowerCase().includes('день') ||
             String(rows[i][0]).toLowerCase().includes('day')){
            headerRow = i; break;
          }
        }
        if(headerRow < 0) return null;

        const days = {1:[], 2:[], 3:[]};
        const groups = {1:{}, 2:{}, 3:{}};
        for(let r = headerRow+1; r < rows.length; r++){
          const row = rows[r];
          const day = parseInt(row[0]);
          if(![1,2,3].includes(day)) continue;
          const group  = String(row[1]||'').trim();
          const name   = String(row[2]||'').trim();
          const sets   = parseInt(row[3]) || 3;
          const reps   = String(row[4]||'10-12').trim();
          const page   = String(row[5]||'').trim();
          const note   = String(row[6]||'').trim();
          if(!name) continue;
          const isTime = reps.includes('сек') || note.includes('час');
          const isBody = note.includes('власна вага') || note.includes('bodyweight');
          if(!groups[day][group]) groups[day][group] = [];
          groups[day][group].push({name, sets, reps, page: page||undefined, isTime: isTime||undefined, bodyweight: isBody||undefined});
        }

        const prefix = sheetName === 'Жінка' ? 'w' : '';
        return [1,2,3].map(dayNum => ({
          id: prefix + 'd' + dayNum,
          label: 'День ' + dayNum,
          groups: Object.entries(groups[dayNum]).map(([label, items]) => ({label, items})),
          cardio: sheetName === 'Жінка'
            ? '🚶 Розминка: 10 хв легке кардіо + суглобова гімнастика.'
            : '🏃 КАРДІО: 10–15 хв легке кардіо після тренування.'
        }));
      }

      const manDays = parseSheet('Чоловік');
      const womanDays = parseSheet('Жінка');

      if(!manDays && !womanDays){
        showToast('Помилка: аркуші "Чоловік" / "Жінка" не знайдено');
        return;
      }

      if(manDays){
        localStorage.setItem('custom-plan-man', JSON.stringify(manDays));
      }
      if(womanDays){
        localStorage.setItem('custom-plan-woman', JSON.stringify(womanDays));
      }

      loadCustomPlans();
      currentDay = 0;
      pendingSets = {};
      savedThisSession = {};
      checkedState = {};
      lastLogs = {};
      loadLastLogs().then(renderAll);
      showToast('✅ План завантажено!');
    }catch(err){
      console.error(err);
      showToast('Помилка читання файлу: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function loadCustomPlans(){
  const man = localStorage.getItem('custom-plan-man');
  const woman = localStorage.getItem('custom-plan-woman');
  if(man){
    try{
      const parsed = JSON.parse(man);
      DAYS_MAN.length = 0;
      parsed.forEach(d => DAYS_MAN.push(d));
    }catch(e){}
  }
  if(woman){
    try{
      const parsed = JSON.parse(woman);
      DAYS_WOMAN.length = 0;
      parsed.forEach(d => DAYS_WOMAN.push(d));
    }catch(e){}
  }
}

document.getElementById('xlsxInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) importXlsx(file);
  e.target.value = '';
});

  updateHeaderText();
  loadCustomPlans();
